<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon/lotus16.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#141414" />
    <meta name="description" content="Web site created using create-react-app" />
    <link rel="apple-touch-icon" href="/favicon/lotus128.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap"
      rel="stylesheet" />
    <title>Undistracted Me</title>
    <!--
      Inline style: set page background before any paint to prevent white flash.
      CSS variables set by the script below flow through to this rule immediately.
    -->
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background-color: #F0F0F2;
      }

      [data-mode="dark"],
      [data-mode="dark"] body {
        background-color: #141414;
      }

      /* Fallback: match OS dark preference before themeInit.js runs */
      @media (prefers-color-scheme: dark) {

        html:not([data-mode="light"]),
        html:not([data-mode="light"]) body {
          background-color: #141414;
        }
      }
    </style>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/index.jsx"></script>
  </body>

</html>
