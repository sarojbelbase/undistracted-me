<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <title>GBIME — Stock Data Debug</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: monospace;
        background: #0f1117;
        color: #e2e8f0;
        padding: 24px;
      }

      h1 {
        font-size: 18px;
        margin-bottom: 4px;
        color: #f8fafc;
      }

      .sub {
        font-size: 12px;
        color: #64748b;
        margin-bottom: 20px;
      }

      .stats {
        display: flex;
        gap: 24px;
        margin-bottom: 20px;
        flex-wrap: wrap;
      }

      .stat {
        background: #1e2433;
        border-radius: 10px;
        padding: 12px 18px;
      }

      .stat-label {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: .08em;
        color: #64748b;
      }

      .stat-value {
        font-size: 22px;
        font-weight: 700;
        margin-top: 2px;
      }

      .up {
        color: #22c55e;
      }

      .down {
        color: #ef4444;
      }

      .neutral {
        color: #94a3b8;
      }

      canvas {
        display: block;
        border-radius: 10px;
      }

      .chart-wrap {
        background: #1e2433;
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 20px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }

      th {
        text-align: left;
        padding: 6px 10px;
        color: #64748b;
        border-bottom: 1px solid #1e2433;
        position: sticky;
        top: 0;
        background: #0f1117;
      }

      td {
        padding: 5px 10px;
        border-bottom: 1px solid #1a1f2e;
      }

      tr:hover td {
        background: #1e2433;
      }

      .table-wrap {
        max-height: 380px;
        overflow-y: auto;
        border: 1px solid #1e2433;
        border-radius: 10px;
      }

      .badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 99px;
        font-size: 10px;
        font-weight: 700;
      }

      .badge.up {
        background: #14532d;
        color: #4ade80;
      }

      .badge.down {
        background: #7f1d1d;
        color: #f87171;
      }

      .badge.neutral {
        background: #1e293b;
        color: #94a3b8;
      }

      .section-title {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: .1em;
        color: #64748b;
        margin-bottom: 8px;
      }

      .note {
        font-size: 11px;
        color: #f59e0b;
        background: #1c1a0a;
        border: 1px solid #78350f;
        border-radius: 8px;
        padding: 10px 14px;
        margin-bottom: 20px;
      }
    </style>
  </head>

      // ─── Note ───────────────────────────────────────────────────────────────────
      document.getElementById('note').innerHTML =
        `⚠ prices[0] = <b>${prevClose_OLD}</b> — first tick at <b>${toNPTFull(sorted[0].tradeDate)}</b> NPT.<br>
   This is a <em>same-day intraday open</em>, <b>not</b> yesterday's close.<br>
   The gap between 249 (prices[0] at ~10:10 AM) and the rest of the ticks (~11:05 AM onward) is<br>
   <b>${((sorted[1].tradeDate - sorted[0].tradeDate) / 1000 / 60).toFixed(1)} minutes</b> — confirming prices[0] is the pre-market/opening reference, not a prior-day close.<br>
   <br>
   ✅ <b>New prevClose = prices[n-2] = ${prevClose_NEW}</b> → Change: <b>${changeNew > 0 ? '+' : ''}${changeNew.toFixed(2)} (${pctNew > 0 ? '+' : ''}${pctNew.toFixed(2)}%)</b> which matches NEPSE display (+8.00 / +3.32%) direction.`;

      // ─── Canvas chart ───────────────────────────────────────────────────────────
      const canvas = document.getElementById('chart');
      const W = canvas.parentElement.clientWidth - 32;
      canvas.width = W;
      const H = 180;
      const ctx = canvas.getContext('2d');

      const PAD = { top: 12, bottom: 28, left: 12, right: 12 };
      const min = Math.min(...prices);
      const max = Math.max(...prices);
      const range = max - min || 1;

      function px(i) {
        return PAD.left + (i / (prices.length - 1)) * (W - PAD.left - PAD.right);
      }
      function py(v) {
        return PAD.top + (1 - (v - min) / range) * (H - PAD.top - PAD.bottom);
      }

      // Gradient fill
      const grad = ctx.createLinearGradient(0, PAD.top, 0, H - PAD.bottom);
      grad.addColorStop(0, 'rgba(34,197,94,0.3)');
      grad.addColorStop(1, 'rgba(34,197,94,0.02)');

      ctx.beginPath();
      ctx.moveTo(px(0), py(prices[0]));
      for (let i = 1; i < prices.length; i++) ctx.lineTo(px(i), py(prices[i]));
      ctx.lineTo(px(prices.length - 1), H - PAD.bottom);
      ctx.lineTo(px(0), H - PAD.bottom);
      ctx.closePath();
      ctx.fillStyle = grad;
      ctx.fill();

      // Line
      ctx.beginPath();
      ctx.moveTo(px(0), py(prices[0]));
      for (let i = 1; i < prices.length; i++) ctx.lineTo(px(i), py(prices[i]));
      ctx.strokeStyle = '#22c55e';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // Mark prices[0] — OLD prevClose
      ctx.beginPath();
      ctx.arc(px(0), py(prices[0]), 5, 0, Math.PI * 2);
      ctx.fillStyle = '#ef4444';
      ctx.fill();
      ctx.fillStyle = '#ef4444';
      ctx.font = '10px monospace';
      ctx.fillText(`prices[0]=${prevClose_OLD} (OLD prevClose)`, px(0) + 8, py(prices[0]) - 4);

      // Mark prices[n-2] — NEW prevClose
      const idx2 = prices.length - 2;
      ctx.beginPath();
      ctx.arc(px(idx2), py(prices[idx2]), 5, 0, Math.PI * 2);
      ctx.fillStyle = '#3b82f6';
      ctx.fill();
      ctx.fillStyle = '#3b82f6';
      ctx.font = '10px monospace';
      ctx.fillText(`prices[n-2]=${prevClose_NEW} (NEW prevClose)`, px(idx2) - 140, py(prices[idx2]) - 6);

      // Mark LTP
      ctx.beginPath();
      ctx.arc(px(prices.length - 1), py(ltp), 5, 0, Math.PI * 2);
      ctx.fillStyle = '#f8fafc';
      ctx.fill();
      ctx.fillStyle = '#f8fafc';
      ctx.font = '10px monospace';
      ctx.fillText(`LTP=${ltp}`, px(prices.length - 1) - 52, py(ltp) - 6);

      // X-axis time labels (every ~30 ticks)
      ctx.fillStyle = '#475569';
      ctx.font = '9px monospace';
      const step = Math.floor(prices.length / 8);
      for (let i = 0; i < prices.length; i += step) {
        const t = toNPT(sorted[i].tradeDate);
        ctx.fillText(t, px(i) - 18, H - 6);
      }

      // ─── Table ───────────────────────────────────────────────────────────────────
      const tbody = document.getElementById('tbody');
      sorted.forEach((row, i) => {
        const prev = i > 0 ? sorted[i - 1].closingPrice : null;
        const delta = prev !== null ? (row.closingPrice - prev) : null;
        const dir = delta === null ? '' : delta > 0 ? 'up' : delta < 0 ? 'down' : 'neutral';
        const deltaStr = delta === null ? '—'
          : `${delta > 0 ? '+' : ''}${delta.toFixed(2)}`;

        const isFirst = i === 0;
        const isLast = i === sorted.length - 1;
        const isN2 = i === sorted.length - 2;
        const rowBg = isFirst ? 'background:#3f1d1d' : isN2 ? 'background:#1a2a3f' : isLast ? 'background:#1a2f1a' : '';

        tbody.innerHTML += `<tr style="${rowBg}">
    <td>${i}</td>
    <td>${row.tradeDate}</td>
    <td>${toNPTFull(row.tradeDate)}${isFirst ? ' <span class="badge down">prices[0] OLD prevClose</span>' : ''}${isN2 ? ' <span class="badge" style="background:#1e3a5f;color:#93c5fd">prices[n-2] NEW prevClose</span>' : ''}${isLast ? ' <span class="badge up">LTP prices[n-1]</span>' : ''}</td>
    <td><b>${row.closingPrice.toFixed(2)}</b></td>
    <td class="${dir}">${deltaStr}</td>
  </tr>`;
      });
    </script>
  </body>

</html>
