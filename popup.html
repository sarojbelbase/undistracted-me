<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Undistracted Me</title>
    <style>
      /* Minimal reset — keeps popup body tight */
      html,
      body {
        margin: 0;
        padding: 0;
        width: 360px;
        min-height: 0;
        background: #ebebeb;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      [data-mode="dark"],
      [data-mode="dark"] body {
        background: #141414;
      }
      @media (prefers-color-scheme: dark) {
        html:not([data-mode="light"]),
        html:not([data-mode="light"]) body {
          background: #141414;
        }
      }
    </style>
  </head>
  <body>
    <div id="popup-root"></div>
    <script type="module" src="/src/popup/index.jsx"></script>
  </body>
</html>
