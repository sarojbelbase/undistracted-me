<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signing in…</title>
    <style>
      body {
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-family: system-ui, sans-serif;
        background: #f5f5f7;
        color: #333;
        font-size: 14px;
      }
    </style>
  </head>

  <body>
    <p id="msg">Completing sign-in…</p>
    <script>
      (function () {
        const params = new URLSearchParams(location.search);
        const code = params.get('code');
        const error = params.get('error');

        if (globalThis.opener && globalThis.opener !== globalThis) {
          // Determine message type from state param (Spotify passes 'spotify-auth-callback').
          // Fall back to 'google-auth-callback' for backward compatibility.
          const state = params.get('state');
          const type = (state === 'spotify-auth-callback') ? 'spotify-auth-callback' : 'google-auth-callback';
          // Send result back to the tab that opened us, then close.
          globalThis.opener.postMessage(
            { type, code: code || null, error: error || null },
            location.origin
          );
          globalThis.close();
        } else {
          // Fallback: no opener — show a message.
          document.getElementById('msg').textContent =
            error ? ('Sign-in error: ' + error) : 'Signed in. You can close this window.';
        }
      })();
    </script>
  </body>

</html>
